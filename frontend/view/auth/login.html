<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng Nhập — Vault Storage</title>

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="../../asset/icons/main_logo_2.png" />

  <!-- Styles -->
  <link rel="stylesheet" href="../../styles/auth/login.css" />
  <link rel="stylesheet" href="../../styles/popup/styles.css" />
</head>
<body>

  <!-- ── Toast container ──────────────────────────────────── -->
  <div id="toast-container" role="alert" aria-live="polite"></div>

  <!-- ── Theme toggle ─────────────────────────────────────── -->
  <button
    id="theme-toggle"
    class="theme-toggle"
    type="button"
    aria-label="Chuyển sang Dark mode"
    title="Chuyển sang Dark mode"
  >
    <!-- Sun icon (dark mode active) -->
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <!-- Moon icon (light mode active) -->
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- ── Animated background ─────────────────────────────── -->
  <div class="auth-bg" aria-hidden="true">
    <div class="auth-bg__orb auth-bg__orb--1"></div>
    <div class="auth-bg__orb auth-bg__orb--2"></div>
    <div class="auth-bg__orb auth-bg__orb--3"></div>
  </div>
  <div id="particles-js" aria-hidden="true"></div>

  <!-- ── Main wrapper ─────────────────────────────────────── -->
  <main class="auth-wrapper">
    <div class="login-card" id="login-card" role="main">

      <!-- Card header -->
      <header class="card-header">
        <div class="logo-wrap" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h1 class="card-title">Chào mừng trở lại</h1>
        <p class="card-subtitle">Đăng nhập để tiếp tục sử dụng Vault Storage</p>
      </header>

      <!-- Step indicator: ● ○ -->
      <div class="step-indicator" aria-label="Bước hiện tại" role="status">
        <span class="step-dot step-dot--active" aria-label="Bước 1: Email"></span>
        <span class="step-dot" aria-label="Bước 2: Mật khẩu"></span>
      </div>

      <!-- ═══════════════════════════════════════════════════
           STEP 1 — Email
           ══════════════════════════════════════════════════ -->
      <section id="step-1" aria-label="Bước 1: Nhập email">

        <div class="form-group">
          <div class="input-field">
            <input
              type="email"
              id="email"
              name="email"
              placeholder="example@email.com"
              autocomplete="email"
              required
            />
            <label for="email">Địa chỉ email</label>
          </div>
          <p class="input-error-msg" id="email-error" role="alert"></p>
        </div>

        <button id="btn-next" class="btn-primary" type="button" aria-label="Tiếp tục với email này">
          <span>Tiếp tục</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>

        <!-- Divider -->
        <div class="divider" aria-hidden="true"><span>hoặc</span></div>

        <!-- Social Login -->
        <div class="social-row">
          <button class="social-btn" type="button" id="google-login-btn" aria-label="Đăng nhập bằng Google">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span>Google</span>
          </button>
          <button class="social-btn" type="button" id="facebook-login-btn" aria-label="Đăng nhập bằng Facebook">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"/>
            </svg>
            <span>Facebook</span>
          </button>
        </div>

        <p class="footer-links">
          Chưa có tài khoản?
          <a id="signup-link" href="#" aria-label="Đăng ký tài khoản mới">Đăng ký ngay</a>
        </p>

      </section><!-- /step-1 -->

      <!-- ═══════════════════════════════════════════════════
           STEP 2 — Password  (hidden until step 1 is done)
           ══════════════════════════════════════════════════ -->
      <section id="step-2" aria-label="Bước 2: Nhập mật khẩu">

        <!-- Email summary pill -->
        <div class="email-summary">
          <svg class="email-summary__icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <span class="email-summary__address" id="email-display" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <div class="input-field password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Nhập mật khẩu của bạn"
              autocomplete="current-password"
              required
            />
            <label for="password">Mật khẩu</label>
            <!-- Toggle show/hide -->
            <button
              id="toggle-password"
              class="toggle-password"
              type="button"
              aria-label="Hiện mật khẩu"
            >
              <!-- Eye open -->
              <svg class="icon-eye-on" width="18" height="18" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye off -->
              <svg class="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <p class="input-error-msg" id="password-error" role="alert"></p>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember" />
            <span>Ghi nhớ đăng nhập</span>
          </label>
          <a id="forgot-link" href="#" class="link-plain">Quên mật khẩu?</a>
        </div>

        <button id="btn-submit" class="btn-primary" type="button" aria-label="Đăng nhập">
          <span>Đăng nhập</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>

        <button id="btn-back" class="btn-secondary" type="button" aria-label="Quay lại bước nhập email">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
          Quay lại
        </button>

      </section><!-- /step-2 -->

    </div><!-- /login-card -->
  </main>

  <!-- ── Scripts ─────────────────────────────────────────── -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="../../javascript/group_password/effect/input_pass_effect/mang_nhen.js"></script>
  <script type="module" src="../../javascript/auth/login.js"></script>
</body>
</html>
