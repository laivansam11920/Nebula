<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Ký Tài Khoản</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh//gemini-dot/learnpythonserver-sm@main/frontend/styles/group_password/create_a_password.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh//gemini-dot/learnpythonserver-sm@main/frontend/styles/popup/styles.css"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://cdn.jsdelivr.net/gh//gemini-dot/learnpythonserver-sm@main/frontend/asset/icons/main_logo_2.png"
    />
  </head>
  <body>
    <div id="toast-container"></div>
    <div class="container">
      <div class="login-box signup-box">
        <div class="logo">
          <div class="logo-circle">
            <svg
              width="30"
              height="30"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#ffffff"
              stroke-width="2"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
        </div>
        <h1>Tạo tài khoản mới</h1>
        <p class="subtitle">Điền thông tin bên dưới để bắt đầu</p>

        <div class="form-container">
          <div class="input-row">
            <div class="input-group half">
              <label for="firstname">Họ</label>
              <input type="text" id="firstname" placeholder="Nguyễn" required />
            </div>
            <div class="input-group half">
              <label for="lastname">Tên</label>
              <input type="text" id="lastname" placeholder="Văn A" required />
            </div>
          </div>

          <div class="input-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="example@email.com"
              required
            />
          </div>

          <div class="input-group">
            <label for="password">Mật khẩu</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                placeholder="Tối thiểu 8 ký tự"
                required
              />
              <button
                type="button"
                class="toggle-password"
                onclick="togglePassword('password')"
              >
                <svg
                  class="eye-icon"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
            <div class="password-strength" id="passwordStrength">
              <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
              </div>
              <span class="strength-text" id="strengthText"
                >Độ mạnh mật khẩu</span
              >
            </div>
          </div>

          <div class="input-group">
            <label for="confirm-password">Xác nhận mật khẩu</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="confirm-password"
                placeholder="Nhập lại mật khẩu"
                required
              />
              <button
                type="button"
                class="toggle-password"
                onclick="togglePassword('confirm-password')"
              >
                <svg
                  class="eye-icon"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>

          <form id="main-signup-form" class="form-container">
            <label class="checkbox-container">
              <input type="checkbox" id="terms" required />
              <span class="checkbox-text"
                >Tôi đồng ý với
                <a href="https://vault-storage.me/privacy_policy"
                  >Điều khoản dịch vụ</a
                >
                và
                <a href="https://vault-storage.me/privacy_policy"
                  >Chính sách bảo mật</a
                ></span
              >
            </label>

            <button type="submit" class="submit-btn" onclick="handleSignup()">
              <span>Tạo tài khoản</span>
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M5 12h14"></path>
                <path d="M12 5l7 7-7 7"></path>
              </svg>
            </button>
          </form>

          <div class="divider">
            <span>hoặc đăng ký với</span>
          </div>

          <div class="social-login">
            <button class="social-btn">
              <svg width="20" height="20" viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                />
                <path
                  fill="currentColor"
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                />
                <path
                  fill="currentColor"
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                />
                <path
                  fill="currentColor"
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                />
              </svg>
              <span>Google</span>
            </button>
            <button class="social-btn">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path
                  d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"
                />
              </svg>
              <span>Facebook</span>
            </button>
          </div>

          <p class="signup-link">
            Đã có tài khoản?
            <a href="https://vault-storage.me/auth/login">Đăng nhập ngay</a>
          </p>
        </div>
      </div>

      <div class="decorative-bg">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
      </div>
    </div>

    <div class="footer">
      <p>
        © <span id="year"></span> <strong>learnpythonserver-sm</strong>. All
        rights reserved.
      </p>
      <p>
        Designed by
        <a href="https://www.facebook.com/cu.sam.801505">Lại Văn Sâm</a>
      </p>
    </div>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>

    <div id="particles-js"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh//gemini-dot/learnpythonserver-sm@main/frontend/js_dist/group_password/effect/input_pass_effect/mang_nhen.js"></script>
    <script src="https://cdn.jsdelivr.net/gh//gemini-dot/learnpythonserver-sm@main/frontend/js_dist/popup/popup.js"></script>
    <script src="https://cdn.jsdelivr.net/gh//gemini-dot/learnpythonserver-sm@main/frontend/js_dist/group_password/effect/create_a_password/hieu_ung_dat_pass.js"></script>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/gh//gemini-dot/learnpythonserver-sm@main/frontend/js_dist/group_password/main/create_a_password.js?v=1.1"
    ></script>
    <script src="https://cdn.jsdelivr.net/gh//gemini-dot/learnpythonserver-sm@main/frontend/js_dist/group_password/effect/input_pass_effect/canh_bao_dep.js"></script>
    <script src="https://cdn.jsdelivr.net/gh//gemini-dot/learnpythonserver-sm@main/frontend/js_dist/group_password/effect/create_a_password/togglepassword.js"></script>
    <script src="https://cdn.jsdelivr.net/gh//gemini-dot/learnpythonserver-sm@main/frontend/js_dist/group_password/effect/create_a_password/dieu_khoan&chinh_sach.js"></script>
  </body>
</html>
